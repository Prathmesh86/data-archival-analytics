services:
  postgres:
    image: postgres:17-alpine
    container_name: task3-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql

  backend:
    build: ./backend
    container_name: task3-backend
    depends_on:
      - postgres
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: analytics_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: task3-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
